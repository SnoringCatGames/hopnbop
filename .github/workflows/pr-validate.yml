name: PR Validate

# Phase G replacement for the legacy AWS-flavored test workflow.
# Runs on every PR targeting main:
#   - GDScript formatter check (addons/gdscript_formatter)
#   - GUT unit + integration (per-file, against ephemeral
#     Nakama + Postgres docker-compose)
#   - go test / go vet / staticcheck for the Nakama runtime
#     modules in third_party/snoringcat-platform/runtime/
#   - go vet / build for the Pulumi project in
#     third_party/snoringcat-platform/infra/pulumi/snoringcat-platform/
#
# AWS-specific tests (SAM build, moto-mocked DDB, GameLift
# integration) are intentionally absent — they're going away
# with Phase F.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.5.0-stable

jobs:
  gdscript-format:
    name: GDScript formatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
      - name: Run gdscript_formatter --check
        run: |
          # The formatter addon is committed; running with --check
          # produces a non-zero exit when formatting is off.
          if [ -d addons/gdscript_formatter ]; then
            godot --headless --path . \
              --script addons/gdscript_formatter/cli.gd -- --check
          else
            echo "gdscript_formatter not vendored; skipping"
          fi

  game-config-parity:
    name: game.yaml ↔ project.godot parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check protocol_version parity
        run: |
          # game.yaml::protocol_version MUST equal
          # project.godot::application/config/protocol_version,
          # or the runtime's version_check RPC will start
          # rejecting every client right after deploy.
          # See MULTI_GAME_ROADMAP.md Stage 2.7 and
          # PLATFORM_ARCHITECTURE.md "Per-game protocol versioning".
          set -e
          if [ ! -f game.yaml ]; then
            echo "::error::game.yaml missing at repo root"
            exit 1
          fi
          yaml_v=$(grep -E '^protocol_version:' game.yaml \
            | head -n1 | awk '{print $2}')
          godot_v=$(grep -E '^config/protocol_version' \
            project.godot | head -n1 | awk -F'=' '{print $2}' \
            | tr -d ' \r')
          echo "game.yaml::protocol_version    = $yaml_v"
          echo "project.godot::protocol_version = $godot_v"
          if [ -z "$yaml_v" ] || [ -z "$godot_v" ]; then
            echo "::error::could not parse protocol_version from one of the files"
            exit 1
          fi
          if [ "$yaml_v" != "$godot_v" ]; then
            echo "::error::protocol_version mismatch: game.yaml=$yaml_v vs project.godot=$godot_v"
            exit 1
          fi
          echo "ok: protocol_version matches ($yaml_v)"
      - name: Check legal_version parity
        run: |
          # game.yaml::legal.legal_version MUST equal
          # src/core/legal_version.gd::LEGAL_VERSION, or the
          # consent screen will force re-consent on first online
          # boot (the runtime-reported value wins when present;
          # the constant is only the offline / pre-fetch fallback,
          # so a mismatch is annoying-but-safe rather than a hard
          # outage — still worth catching at PR time).
          # See MULTI_GAME_ROADMAP.md Stage 3.10.
          set -e
          if [ ! -f src/core/legal_version.gd ]; then
            echo "::error::src/core/legal_version.gd missing"
            exit 1
          fi
          # game.yaml block:
          #   legal:
          #     legal_version: "1.1"
          # Extract the value (strip quotes / whitespace / CR).
          yaml_v=$(grep -E '^[[:space:]]+legal_version:' game.yaml \
            | head -n1 | awk -F':' '{print $2}' \
            | tr -d ' "\r')
          # legal_version.gd:
          #   const LEGAL_VERSION := "1.1"
          godot_v=$(grep -E '^const LEGAL_VERSION' \
            src/core/legal_version.gd | head -n1 \
            | awk -F':=' '{print $2}' | tr -d ' "\r')
          echo "game.yaml::legal.legal_version = $yaml_v"
          echo "legal_version.gd::LEGAL_VERSION = $godot_v"
          if [ -z "$yaml_v" ] || [ -z "$godot_v" ]; then
            echo "::error::could not parse legal_version from one of the files"
            exit 1
          fi
          if [ "$yaml_v" != "$godot_v" ]; then
            echo "::error::legal_version mismatch: game.yaml=$yaml_v vs legal_version.gd=$godot_v"
            exit 1
          fi
          echo "ok: legal_version matches ($yaml_v)"

  godot-tests:
    name: GUT unit + integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nakama
          POSTGRES_USER: nakama
          POSTGRES_PASSWORD: ci-test-password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nakama"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      nakama:
        image: heroiclabs/nakama:3.25.0
        env:
          DATABASE_ADDRESS: nakama:ci-test-password@postgres:5432/nakama
        ports: ["7350:7350", "7351:7351"]
        options: >-
          --entrypoint /bin/sh
        # Trickier than a normal service — see the "Bring up
        # Nakama in CI" step below for the actual launch.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
      - name: Wait for Nakama healthcheck
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:7350/healthcheck; then
              echo "Nakama up"; exit 0
            fi
            sleep 2
          done
          echo "Nakama did not come up"; exit 1
      - name: Run GUT (per-file)
        run: |
          # Run one file at a time — directory mode misses
          # discovery on this project (see hopnbop CLAUDE.md
          # "Project-Specific Testing Notes").
          set -e
          for f in $(find test/unit test/integration -name "test_*.gd" 2>/dev/null); do
            echo "== $f =="
            godot --headless -s --path . \
              addons/gut/gut_cmdln.gd \
              -gtest=res://${f#./} -gexit
          done

  nakama-runtime-go:
    name: Nakama runtime Go check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: third_party/snoringcat-platform/runtime
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - run: go vet ./...
      - run: go test ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

  pulumi-go-build:
    name: Pulumi project compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: third_party/snoringcat-platform/infra/pulumi/snoringcat-platform
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - run: go vet ./...
      - run: go build ./...
