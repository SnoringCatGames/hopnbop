name: Release

# Triggered on v*.*.* tags. Builds the Linux server image, pushes
# to Edgegap registry, bumps fleet version. Builds the Godot web
# export, deploys via wrangler pages. Builds native exports.
# Rolls Nakama runtime modules. Posts release notes to Discord.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release (e.g. v0.32.0)
        required: true

env:
  GODOT_VERSION: 4.7.0-beta1

jobs:
  game-server:
    name: Game-server image → Edgegap
    # Delegate to the standalone workflow so the build and
    # version-registration logic lives in one place.
    uses: ./.github/workflows/game-server.yml
    with:
      version: ${{ github.ref_name }}
      reason: 'release ${{ github.ref_name }}'
    secrets:
      EDGEGAP_TOKEN: ${{ secrets.EDGEGAP_TOKEN }}
      EDGEGAP_REGISTRY_USERNAME: ${{ secrets.EDGEGAP_REGISTRY_USERNAME }}
      EDGEGAP_REGISTRY_PASSWORD: ${{ secrets.EDGEGAP_REGISTRY_PASSWORD }}
      EDGEGAP_REGISTRY_PROJECT: ${{ secrets.EDGEGAP_REGISTRY_PROJECT }}
      NAKAMA_HTTP_KEY: ${{ secrets.NAKAMA_HTTP_KEY }}

  web-client:
    name: Godot web export → Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
      - name: Export web build
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" \
            build/web/index.html || true
          test -s build/web/index.html
          cp -r build/web/* web/ 2>/dev/null || true
      - name: Deploy to Cloudflare Pages + R2
        # Heavy engine assets (.wasm ~38 MB, .pck) bypass Pages'
        # 25 MiB/file cap by living on R2; the rest goes to Pages.
        # Mirrors scripts/deploy-cf-pages.ps1 which does the same
        # split for local deploys.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: hopnbop-assets
          PAGES_PROJECT: hopnbop-website
        run: |
          set -euo pipefail
          HEAVIES=(index.wasm index.pck index.audio.worklet.js index.audio.position.worklet.js)

          # 1. R2 CORS (Pages origin needs to fetch the wasm/pck;
          #    r2.dev defaults block cross-origin reads).
          curl -fsS -X PUT \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"rules":[{"allowed":{"origins":["*"],"methods":["GET","HEAD"],"headers":["*"]},"exposeHeaders":["Content-Length","ETag"],"maxAgeSeconds":3600}]}' \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/r2/buckets/$R2_BUCKET/cors" \
            > /dev/null

          # 2. Upload heavies to R2 (--remote: wrangler 4.x
          #    defaults to a local dev simulator otherwise).
          for f in "${HEAVIES[@]}"; do
            [[ -f "web/$f" ]] || { echo "skip (missing): $f"; continue; }
            mime="application/octet-stream"
            [[ "$f" == *.wasm ]] && mime="application/wasm"
            [[ "$f" == *.js ]]   && mime="application/javascript"
            echo "uploading $f ($mime) to r2://$R2_BUCKET"
            # --cache-control: force browsers to revalidate
            # via ETag on every load. Without this, R2 sent no
            # cache header and browsers cached for hours
            # heuristically, so users kept loading old builds.
            npx -y wrangler@latest r2 object put \
              "$R2_BUCKET/$f" --file "web/$f" \
              --content-type "$mime" \
              --cache-control "no-cache, must-revalidate" \
              --remote
          done

          # 3. Discover the bucket's public r2.dev URL.
          R2_URL_OUT=$(npx -y wrangler@latest r2 bucket dev-url get $R2_BUCKET 2>&1)
          R2_BASE=$(echo "$R2_URL_OUT" | grep -oE 'https://[a-z0-9-]+\.r2\.dev' | head -1)
          [[ -n "$R2_BASE" ]] || {
            echo "::error::could not parse r2.dev URL"
            echo "$R2_URL_OUT"
            exit 1
          }
          echo "R2 base URL: $R2_BASE"

          # 4. Stage: copy web/ minus heavies, patch GODOT_CONFIG
          #    in index.html so Godot's loader fetches heavies
          #    from R2 instead of looking for them on Pages.
          rm -rf staging
          cp -r web staging
          for f in "${HEAVIES[@]}"; do rm -f "staging/$f"; done
          sed -i \
            -e 's|"executable":"index"|"executable":"'"$R2_BASE"'/index"|g' \
            -e 's|"mainPack":"index\.pck\([^"]*\)"|"mainPack":"'"$R2_BASE"'/index.pck\1"|g' \
            staging/index.html
          # _headers (COOP/COEP) no longer needed once wasm is
          # cross-origin and crossOriginIsolated isn't required.
          rm -f staging/_headers

          # 5. Deploy. cd into staging so wrangler picks up any
          #    Pages Functions in functions/ (it discovers them
          #    relative to CWD, not the deploy-dir argument).
          cd staging
          npx -y wrangler@latest pages deploy . \
            --project-name=$PAGES_PROJECT --branch=main

  nakama-runtime:
    name: Roll Nakama runtime modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build plugin .so
        run: |
          RUNTIME_DIR="third_party/snoringcat-platform/runtime"
          mkdir -p "$RUNTIME_DIR/build"
          BUILD_ID="${{ github.sha }}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X main.BuildID=${BUILD_ID} -X main.BuildTime=${BUILD_TIME}"
          docker run --rm \
            -v "$PWD/$RUNTIME_DIR:/backend" -w /backend \
            heroiclabs/nakama-pluginbuilder:3.25.0 \
            build -buildmode=plugin -trimpath \
            -ldflags "${LDFLAGS}" \
            -o ./build/snoringcat.so .
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.NAKAMA_SSH_KEY }}
          NAKAMA_HOST: ${{ secrets.NAKAMA_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          scp -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/id_ed25519 \
            third_party/snoringcat-platform/runtime/build/snoringcat.so \
            "root@$NAKAMA_HOST:/opt/nakama/modules/snoringcat.so"
          ssh -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/id_ed25519 "root@$NAKAMA_HOST" \
            "cd /opt/nakama && docker compose restart nakama"

  discord-notify:
    name: Discord release notes
    needs: [game-server, web-client, nakama-runtime]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          PREV=$(git tag --sort=-creatordate | sed -n '2p')
          NOTES=$(git log "${PREV:-HEAD~10}..${{ github.ref_name }}" \
            --pretty=format:"- %s (%h)" 2>/dev/null \
            | head -20)
          STATUS="${{ needs.game-server.result == 'success' && needs.web-client.result == 'success' && needs.nakama-runtime.result == 'success' && '✅ deployed' || '❌ partial failure' }}"
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg c "**${{ github.ref_name }}** $STATUS\n$NOTES" '{content:$c}')" \
            "$DISCORD_WEBHOOK_URL"
