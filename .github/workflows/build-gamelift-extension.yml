name: Build GameLift GDExtension

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger, running unconditionally"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGES=$(git diff --name-only HEAD@{24.hours.ago} HEAD 2>/dev/null || echo "initial")
          if echo "$CHANGES" | grep -qE '^(gamelift-gdextension/|\.github/workflows/build-gamelift-extension\.yml)'; then
            echo "Relevant changes found in last 24 hours"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "No relevant changes in last 24 hours, skipping build"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  build-linux:
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            scons \
            cmake \
            libssl-dev \
            python3 \
            git

      - name: Setup godot-cpp
        working-directory: gamelift-gdextension
        run: |
          git clone --recurse-submodules https://github.com/godotengine/godot-cpp.git
          cd godot-cpp
          git checkout godot-4.2-stable

      - name: Build godot-cpp
        working-directory: gamelift-gdextension/godot-cpp
        run: |
          scons platform=linux target=template_release -j$(nproc)
          scons platform=linux target=template_debug -j$(nproc)

      - name: Clone GameLift Server SDK
        working-directory: gamelift-gdextension
        run: |
          # Clone to temp location to avoid overwriting tracked files
          git clone https://github.com/amazon-gamelift/amazon-gamelift-servers-cpp-server-sdk.git gamelift-server-sdk-temp

          # Copy only the directories that are NOT tracked in git
          # (cmake/, root CMakeLists.txt, and SDK CMakeLists.txt have customizations)
          cp -r gamelift-server-sdk-temp/gamelift-server-sdk gamelift-server-sdk/
          cp -r gamelift-server-sdk-temp/gamelift-server-sdk-tests gamelift-server-sdk/
          cp -r gamelift-server-sdk-temp/thirdparty gamelift-server-sdk/
          cp -r gamelift-server-sdk-temp/.github gamelift-server-sdk/
          cp -r gamelift-server-sdk-temp/release-notes gamelift-server-sdk/
          cp -r gamelift-server-sdk-temp/telemetry-metrics gamelift-server-sdk/

          # Restore custom CMakeLists.txt with MSVC runtime configuration
          git restore gamelift-server-sdk/gamelift-server-sdk/CMakeLists.txt

          # Clean up temp directory
          rm -rf gamelift-server-sdk-temp

      - name: Build GameLift Server SDK
        working-directory: gamelift-gdextension/gamelift-server-sdk
        run: |

          # Patch CMake version requirements for modern CMake
          sed -i 's/cmake_minimum_required(VERSION 3\.1)/cmake_minimum_required(VERSION 3.1...3.30)/' CMakeLists.txt
          sed -i 's/CMAKE_MINIMUM_REQUIRED(VERSION 3\.1)/CMAKE_MINIMUM_REQUIRED(VERSION 3.1...3.30)/' gamelift-server-sdk/CMakeLists.txt

          # Recursively insert set(CMAKE_POSITION_INDEPENDENT_CODE ON) at the top of every CMakeLists.txt
          find . -name 'CMakeLists.txt' -print0 | xargs -r -0 sed -i '1s;^;set(CMAKE_POSITION_INDEPENDENT_CODE ON)\n;'

          mkdir -p cmake-build
          cd cmake-build
          cmake -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/prefix" \
            -DGAMELIFT_USE_STD=1 \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DCMAKE_C_FLAGS="-fPIC" \
            -DCMAKE_CXX_FLAGS="-fPIC" \
            -DRUN_UNIT_TESTS=OFF \
            ..
          # Patch CMakeLists.txt files in build tree (including ExternalProject sources)
          find . -name 'CMakeLists.txt' -print0 | xargs -r -0 sed -i -E 's/cmake_minimum_required(VERSION ([0-9]+(\.[0-9]+)?)\)/cmake_minimum_required(VERSION 3.5...3.30)/g'
          find . -name 'CMakeLists.txt' -print0 | xargs -r -0 sed -i -E 's/CMAKE_MINIMUM_REQUIRED(VERSION ([0-9]+(\.[0-9]+)?)\)/CMAKE_MINIMUM_REQUIRED(VERSION 3.5...3.30)/g'

          # Recursively patch all CMakeLists.txt files in cmake-build/thirdparty and subfolders to require CMake >= 3.5 (GNU sed syntax)
          find cmake-build/thirdparty -name 'CMakeLists.txt' -print0 | xargs -r -0 sed -i -E 's/cmake_minimum_required(VERSION ([0-9]+(\.[0-9]+)?)\)/cmake_minimum_required(VERSION 3.5...3.30)/g'
          find cmake-build/thirdparty -name 'CMakeLists.txt' -print0 | xargs -r -0 sed -i -E 's/CMAKE_MINIMUM_REQUIRED(VERSION ([0-9]+(\.[0-9]+)?)\)/CMAKE_MINIMUM_REQUIRED(VERSION 3.5...3.30)/g'

          cmake --build . -j$(nproc)

      - name: Build GDExtension (Release)
        working-directory: gamelift-gdextension
        env:
          GODOT_CPP_PATH: godot-cpp
          GAMELIFT_SDK_PATH: gamelift-server-sdk/cmake-build/prefix
          OPENSSL_PATH: /usr
        run: |
          mkdir -p bin
          scons platform=linux target=template_release -j$(nproc)

      - name: List GameLift SDK output libraries
        working-directory: gamelift-gdextension/gamelift-server-sdk
        run: |
          echo "Listing GameLift SDK output libraries:"
          ls -l cmake-build/prefix/lib || echo "No output lib directory found"
      - name: Build GDExtension (Debug)
        working-directory: gamelift-gdextension
        env:
          GODOT_CPP_PATH: godot-cpp
          GAMELIFT_SDK_PATH: gamelift-server-sdk/cmake-build/prefix
          OPENSSL_PATH: /usr
        run: |
          scons platform=linux target=template_debug -j$(nproc)

      - name: Copy dependencies
        working-directory: gamelift-gdextension
        run: |
          # Copy GameLift SDK library (static)
          cp gamelift-server-sdk/cmake-build/prefix/lib/libaws-cpp-sdk-gamelift-server.a bin/

          # Copy OpenSSL libraries
          cp /usr/lib/x86_64-linux-gnu/libssl.so.3 bin/
          cp /usr/lib/x86_64-linux-gnu/libcrypto.so.3 bin/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gamelift-gdextension-linux
          path: gamelift-gdextension/bin/
          retention-days: 30

  build-windows:
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install SCons
        run: |
          python -m pip install --upgrade pip
          pip install scons

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg install openssl:x64-windows

      - name: Setup godot-cpp
        working-directory: gamelift-gdextension
        run: |
          git clone --recurse-submodules https://github.com/godotengine/godot-cpp.git
          cd godot-cpp
          git checkout godot-4.2-stable

      - name: Build godot-cpp
        working-directory: gamelift-gdextension/godot-cpp
        run: |
          scons platform=windows target=template_release
          scons platform=windows target=template_debug

      - name: Clone GameLift Server SDK
        working-directory: gamelift-gdextension
        shell: pwsh
        run: |
          # Clone to temp location to avoid overwriting tracked files
          git clone https://github.com/amazon-gamelift/amazon-gamelift-servers-cpp-server-sdk.git gamelift-server-sdk-temp

          # Copy only the directories that are NOT tracked in git
          Copy-Item -Path gamelift-server-sdk-temp\gamelift-server-sdk -Destination gamelift-server-sdk\ -Recurse -Force
          Copy-Item -Path gamelift-server-sdk-temp\gamelift-server-sdk-tests -Destination gamelift-server-sdk\ -Recurse -Force
          Copy-Item -Path gamelift-server-sdk-temp\thirdparty -Destination gamelift-server-sdk\ -Recurse -Force
          Copy-Item -Path gamelift-server-sdk-temp\.github -Destination gamelift-server-sdk\ -Recurse -Force
          Copy-Item -Path gamelift-server-sdk-temp\release-notes -Destination gamelift-server-sdk\ -Recurse -Force
          Copy-Item -Path gamelift-server-sdk-temp\telemetry-metrics -Destination gamelift-server-sdk\ -Recurse -Force

          # Restore custom CMakeLists.txt with MSVC runtime configuration
          git restore gamelift-server-sdk\gamelift-server-sdk\CMakeLists.txt

          # Clean up temp directory
          Remove-Item -Recurse -Force gamelift-server-sdk-temp

      - name: Build GameLift Server SDK
        working-directory: gamelift-gdextension/gamelift-server-sdk
        run: |
          # Clean build directory
          if (Test-Path cmake-build) { Remove-Item -Recurse -Force cmake-build }

          mkdir cmake-build
          cd cmake-build
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$PWD/prefix" `
            -DGAMELIFT_USE_STD=1 `
            -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DCMAKE_CXX_FLAGS_RELEASE="/MT /O2 /Ob2 /DNDEBUG" `
            -DCMAKE_C_FLAGS_RELEASE="/MT /O2 /Ob2 /DNDEBUG" `
            -DRUN_UNIT_TESTS=OFF `
            -DCMAKE_POLICY_DEFAULT_CMP0000=OLD `
            -DOPENSSL_ROOT_DIR="${{ github.workspace }}\vcpkg\installed\x64-windows" `
            ..

          cmake --build . --config Release

      - name: List GameLift SDK build directory (Windows)
        working-directory: gamelift-gdextension/gamelift-server-sdk
        run: |
          echo "Listing GameLift SDK build directory:"
          Get-ChildItem -Path cmake-build -Recurse

      - name: Manually copy GameLift SDK headers and libraries (Windows)
        working-directory: gamelift-gdextension/gamelift-server-sdk
        run: |
          $src_include = "cmake-build\aws-cpp-sdk-gamelift-server\include"
          $dst_include = "cmake-build\prefix\include"
          if (Test-Path $src_include) {
            Copy-Item -Path $src_include -Destination $dst_include -Recurse -Force
          }
          $src_lib = "cmake-build\aws-cpp-sdk-gamelift-server\lib"
          $dst_lib = "cmake-build\prefix\lib"
          if (Test-Path $src_lib) {
            Copy-Item -Path $src_lib -Destination $dst_lib -Recurse -Force
          }

      - name: Build GDExtension (Release)
        working-directory: gamelift-gdextension
        env:
          GODOT_CPP_PATH: godot-cpp
          GAMELIFT_SDK_PATH: gamelift-server-sdk/cmake-build/prefix
          OPENSSL_PATH: ${{ github.workspace }}\vcpkg\installed\x64-windows
        run: |
          mkdir -Force bin
          scons platform=windows target=template_release

      - name: Build GDExtension (Debug)
        working-directory: gamelift-gdextension
        env:
          GODOT_CPP_PATH: godot-cpp
          GAMELIFT_SDK_PATH: gamelift-server-sdk/cmake-build/prefix
          OPENSSL_PATH: ${{ github.workspace }}\vcpkg\installed\x64-windows
        run: |
          scons platform=windows target=template_debug

      - name: Copy dependencies
        working-directory: gamelift-gdextension
        run: |
          # GameLift SDK is statically linked, no need to copy
          # Only copy OpenSSL DLLs (required at runtime)
          Copy-Item ${{ github.workspace }}\vcpkg\installed\x64-windows\bin\libssl-3-x64.dll bin\
          Copy-Item ${{ github.workspace }}\vcpkg\installed\x64-windows\bin\libcrypto-3-x64.dll bin\

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gamelift-gdextension-windows
          path: gamelift-gdextension/bin/
          retention-days: 30

  build-macos:
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Clean previous build (macOS)
        run: |
          if [ -d "gamelift-gdextension/gamelift-server-sdk" ]; then
            rm -rf gamelift-gdextension/gamelift-server-sdk/cmake-build
          fi

      - name: Install dependencies
        run: |
          brew install scons cmake openssl@3

      - name: Setup godot-cpp
        working-directory: gamelift-gdextension
        run: |
          git clone --recurse-submodules https://github.com/godotengine/godot-cpp.git
          cd godot-cpp
          git checkout godot-4.2-stable

      - name: Build godot-cpp
        working-directory: gamelift-gdextension/godot-cpp
        run: |
          scons platform=macos target=template_release
          scons platform=macos target=template_debug

      - name: Clone GameLift Server SDK
        working-directory: gamelift-gdextension
        run: |
          # Clone to temp location to avoid overwriting tracked files
          git clone https://github.com/amazon-gamelift/amazon-gamelift-servers-cpp-server-sdk.git gamelift-server-sdk-temp

          # Copy only the directories that are NOT tracked in git
          cp -r gamelift-server-sdk-temp/gamelift-server-sdk gamelift-server-sdk/
          cp -r gamelift-server-sdk-temp/gamelift-server-sdk-tests gamelift-server-sdk/
          cp -r gamelift-server-sdk-temp/thirdparty gamelift-server-sdk/
          cp -r gamelift-server-sdk-temp/.github gamelift-server-sdk/
          cp -r gamelift-server-sdk-temp/release-notes gamelift-server-sdk/
          cp -r gamelift-server-sdk-temp/telemetry-metrics gamelift-server-sdk/

          # Restore custom CMakeLists.txt with MSVC runtime configuration
          git restore gamelift-server-sdk/gamelift-server-sdk/CMakeLists.txt

          # Clean up temp directory
          rm -rf gamelift-server-sdk-temp

      - name: Build GameLift Server SDK
        working-directory: gamelift-gdextension/gamelift-server-sdk
        run: |
          # Create CMake init file to set policies globally
          mkdir -p cmake-build
          cat > cmake-build/init.cmake << 'EOF'
          set(CMAKE_POLICY_DEFAULT_CMP0000 OLD CACHE STRING "")
          EOF

          cd cmake-build
          OPENSSL_ROOT=$(brew --prefix openssl@3)
          cmake -G "Unix Makefiles" \
            -C init.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PWD/prefix" \
            -DGAMELIFT_USE_STD=1 \
            -DBUILD_SHARED_LIBS=OFF \
            -DRUN_UNIT_TESTS=OFF \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_VERBOSE_MAKEFILE=ON \
            -DEXTERNALPROJECT_LOG_OUTPUT_ON_FAILURE=ON \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            ..

          # Patch CMakeLists.txt files in build tree (including ExternalProject sources)
          find . -name 'CMakeLists.txt' -print0 | xargs -0 sed -i '' -E 's/cmake_minimum_required\(VERSION ([0-9]+(\.[0-9]+)?)\)/cmake_minimum_required(VERSION 3.5...3.30)/g'
          find . -name 'CMakeLists.txt' -print0 | xargs -0 sed -i '' -E 's/CMAKE_MINIMUM_REQUIRED\(VERSION ([0-9]+(\.[0-9]+)?)\)/CMAKE_MINIMUM_REQUIRED(VERSION 3.5...3.30)/g'

          cmake --build . -j1 --verbose

      - name: Build GDExtension (Release)
        working-directory: gamelift-gdextension
        env:
          GODOT_CPP_PATH: godot-cpp
          GAMELIFT_SDK_PATH: gamelift-server-sdk/cmake-build/prefix
          OPENSSL_PATH: /opt/homebrew/opt/openssl@3
        run: |
          mkdir -p bin
          scons platform=macos target=template_release

      - name: Build GDExtension (Debug)
        working-directory: gamelift-gdextension
        env:
          GODOT_CPP_PATH: godot-cpp
          GAMELIFT_SDK_PATH: gamelift-server-sdk/cmake-build/prefix
          OPENSSL_PATH: /opt/homebrew/opt/openssl@3
        run: |
          scons platform=macos target=template_debug

      - name: Copy dependencies
        working-directory: gamelift-gdextension
        run: |
          # Copy GameLift SDK dylib if it exists
          if [ -f gamelift-server-sdk/cmake-build/prefix/lib/libaws-cpp-sdk-gamelift-server.dylib ]; then
            cp gamelift-server-sdk/cmake-build/prefix/lib/libaws-cpp-sdk-gamelift-server.dylib bin/
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gamelift-gdextension-macos
          path: gamelift-gdextension/bin/
          retention-days: 30

  package-artifacts:
    needs: [build-linux, build-windows, build-macos]
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: gamelift-gdextension-linux
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: gamelift-gdextension-windows
          path: artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: gamelift-gdextension-macos
          path: artifacts/macos

      - name: Package artifacts
        run: |
          mkdir -p addons/gamelift/bin

          # Copy Linux binaries
          cp -r artifacts/linux/* addons/gamelift/bin/

          # Copy Windows binaries
          cp -r artifacts/windows/* addons/gamelift/bin/

          # Copy macOS binaries (frameworks are directories)
          cp -r artifacts/macos/* addons/gamelift/bin/

          # Copy gdextension file
          cp gamelift-gdextension/gamelift.gdextension addons/gamelift/

          # List what we have
          echo "Built libraries:"
          ls -lah addons/gamelift/bin/

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gamelift-gdextension-all-platforms
          path: addons/gamelift/
          retention-days: 30

      - name: Create summary
        run: |
          echo "## GameLift GDExtension Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Built for the following platforms:" >> $GITHUB_STEP_SUMMARY
          echo "- Linux (x86_64)" >> $GITHUB_STEP_SUMMARY
          echo "- Windows (x86_64)" >> $GITHUB_STEP_SUMMARY
          echo "- macOS (universal)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the 'gamelift-gdextension-all-platforms' artifact and extract to your project's addons/ directory." >> $GITHUB_STEP_SUMMARY
