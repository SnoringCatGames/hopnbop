name: Probe game-server image entrypoint

# Manual diagnostic: pull the registered Edgegap version's
# image and print its entrypoint.sh content. Used to verify
# that a built image actually contains the latest entrypoint
# code (caching, push-tag, etc. can otherwise hide a stale
# image from outside inspection). Delete this file once it
# stops being useful.

on:
  workflow_dispatch:
    inputs:
      version:
        description: Edgegap version tag to probe
        required: true
        default: v11

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Edgegap registry
        env:
          REGISTRY_USERNAME: ${{ secrets.EDGEGAP_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.EDGEGAP_REGISTRY_PASSWORD }}
        run: |
          echo "$REGISTRY_PASSWORD" | docker login \
            registry.edgegap.com \
            -u "$REGISTRY_USERNAME" \
            --password-stdin
      - name: Pull + dump entrypoint
        env:
          VERSION: ${{ inputs.version }}
          PROJECT: ${{ secrets.EDGEGAP_REGISTRY_PROJECT }}
        run: |
          IMAGE="registry.edgegap.com/${PROJECT}/hopnbop-server:${VERSION}"
          echo "=== docker pull ==="
          docker pull "$IMAGE"
          echo "=== docker history ==="
          docker history --no-trunc "$IMAGE" | head -30
          echo "=== entrypoint.sh inside image ==="
          docker run --rm --entrypoint cat "$IMAGE" /game/entrypoint.sh
          echo "=== ls -la /game/ ==="
          docker run --rm --entrypoint ls "$IMAGE" -la /game/
