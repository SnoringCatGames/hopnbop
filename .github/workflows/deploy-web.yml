name: Deploy Website

on:
  push:
    branches: [release]
    paths:
      - "web/**"
  workflow_dispatch:
    inputs:
      skip_export:
        description: "Skip Godot export (deploy web/ content only)"
        type: boolean
        default: true

env:
  AWS_REGION: us-west-2
  S3_BUCKET: hopnbop-website
  CLOUDFRONT_DISTRIBUTION_ID: E3LT833LSVTW9R
  GODOT_VERSION: "4.5.1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Cache Godot
        if: github.event.inputs.skip_export != 'true'
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64
          key: godot-${{ env.GODOT_VERSION }}-stable-linux-x86_64

      - name: Download Godot
        if: >-
          github.event.inputs.skip_export != 'true'
          && steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          chmod +x "Godot_v${GODOT_VERSION}-stable_linux.x86_64"

      - name: Download Godot export templates
        if: github.event.inputs.skip_export != 'true'
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -o "Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -d /tmp/templates
          mv /tmp/templates/templates/* "$TEMPLATES_DIR/"

      - name: Export Godot web build
        if: github.event.inputs.skip_export != 'true'
        run: |
          mkdir -p build/web
          ./Godot_v${GODOT_VERSION}-stable_linux.x86_64 \
            --headless --export-release "Web" \
            build/web/index.html

      - name: Copy export files to web/
        if: github.event.inputs.skip_export != 'true'
        run: |
          for f in build/web/*; do
            filename=$(basename "$f")
            cp "$f" "web/$filename"
            echo "Copied $filename"
          done

      - name: Sync to S3
        run: |
          aws s3 sync web/ "s3://${S3_BUCKET}/" \
            --delete \
            --exclude ".gitkeep" \
            --exclude "*.md" \
            --cache-control "max-age=3600"

          # Longer cache for immutable assets.
          for ext in wasm pck; do
            aws s3 cp "s3://${S3_BUCKET}/" "s3://${S3_BUCKET}/" \
              --recursive \
              --exclude "*" \
              --include "*.${ext}" \
              --cache-control "max-age=86400" \
              --metadata-directive REPLACE
          done

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"

          echo "Deployed to https://hopnbop.net"
