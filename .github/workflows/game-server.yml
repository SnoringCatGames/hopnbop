name: Game Server Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Edgegap version name (e.g. v1)'
        required: true
        default: 'v1'
      reason:
        description: 'Reason for rolling the game server'
        required: false
        default: 'Manual deploy'
  # Allow release.yml (or any other workflow) to invoke this
  # build via `uses:` so the release pipeline doesn't need to
  # duplicate the export/build/push steps.
  workflow_call:
    inputs:
      version:
        description: 'Edgegap version name'
        required: true
        type: string
      reason:
        description: 'Reason for rolling the game server'
        required: false
        type: string
        default: 'workflow_call'
    secrets:
      SUBMODULE_PAT:
        required: true
      EDGEGAP_TOKEN:
        required: true
      EDGEGAP_REGISTRY_USERNAME:
        required: true
      EDGEGAP_REGISTRY_PASSWORD:
        required: true
      EDGEGAP_REGISTRY_PROJECT:
        required: true
      NAKAMA_HTTP_KEY:
        required: true
      # Container's entrypoint.sh creates a Cloudflare DNS A
      # record `s-<ip>.<SERVER_DNS_BASE>` -> $PUBLIC_IP at
      # startup so web clients can hit a hostname covered by
      # the wildcard cert. Both vars must be plumbed onto the
      # Edgegap app version (is_secret: true) before the
      # entrypoint can do this.
      CLOUDFLARE_DNS_TOKEN:
        required: true
      CLOUDFLARE_DNS_ZONE_ID:
        required: true

jobs:
  game-server:
    name: Build and push Linux server to Edgegap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Default GITHUB_TOKEN only authenticates against the
          # current repo, so submodule clones from sibling
          # private SnoringCatGames repos 404. SUBMODULE_PAT is
          # a classic PAT with `repo` scope across the org.
          token: ${{ secrets.SUBMODULE_PAT }}
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.5.0-stable
          use-dotnet: false
          # --export-release needs the Linux server template at
          # ~/.local/share/godot/export_templates/4.5.stable/.
          # Default for this action is false; without it, the
          # export step fails with "No export template found".
          include-templates: true
      - name: Bridge snoringcat_platform_client addon
        # The addon's tracked source lives in the
        # third_party/snoringcat-platform submodule; it gets
        # copied into addons/ where Godot can find it. Locally
        # we use scripts/setup-platform-addon.ps1 (Windows-only,
        # uses xcopy). In CI we just `cp -r` the same files.
        # Without this, the Platform autoload fails to load and
        # the server can't start.
        run: |
          rm -rf addons/snoringcat_platform_client
          cp -r \
            third_party/snoringcat-platform/addons/snoringcat_platform_client \
            addons/snoringcat_platform_client
      - name: Import project assets
        # Fresh checkouts have no .godot/ cache so the export
        # step would otherwise fail to resolve uid:// references.
        # `--import` is the official way to populate it. Godot
        # always exits non-zero from --import if there are any
        # warnings, so swallow the exit code.
        run: |
          godot --headless --import || true
      - name: Export Linux server release binary
        # Use --export-release (not --export-pack) to produce a
        # standalone Linux server executable. Running the editor
        # binary with --main-pack made `OS.has_feature("editor")`
        # return true at runtime, which triggered preview-mode
        # teardown mid-init and crashed the server with `double
        # free or corruption`. The release export bakes in the
        # right feature set.
        run: |
          mkdir -p build/linux
          godot --headless --export-release "Linux Server" \
            build/linux/hopnbop_server.x86_64 || true
          test -s build/linux/hopnbop_server.x86_64
          test -s build/linux/hopnbop_server.pck
      - name: Build Docker image
        # The registry "project" is *not* EDGEGAP_ORG. Edgegap
        # generates a Harbor project name like
        # `<org>-cwtrbu4s6efi` (visible in the dashboard
        # registry view). EDGEGAP_REGISTRY_PROJECT holds that
        # value. EDGEGAP_ORG is still used for API calls
        # (allocation, app management).
        env:
          VERSION: ${{ inputs.version }}
          PROJECT: ${{ secrets.EDGEGAP_REGISTRY_PROJECT }}
        run: |
          docker build -f Dockerfile.edgegap \
            -t "registry.edgegap.com/${PROJECT}/hopnbop-server:${VERSION}" \
            .
      - name: Login to Edgegap registry
        # Edgegap's registry runs Harbor and requires its own
        # credentials (username + token), separate from
        # EDGEGAP_TOKEN. The username contains a literal `$`
        # (Harbor robot account convention), so we route it
        # through env vars instead of inline ${{...}}
        # substitution to avoid bash treating it as a variable
        # expansion inside double quotes.
        env:
          REGISTRY_USERNAME: ${{ secrets.EDGEGAP_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.EDGEGAP_REGISTRY_PASSWORD }}
        run: |
          echo "$REGISTRY_PASSWORD" | docker login \
            registry.edgegap.com \
            -u "$REGISTRY_USERNAME" \
            --password-stdin
      - name: Push image
        env:
          VERSION: ${{ inputs.version }}
          PROJECT: ${{ secrets.EDGEGAP_REGISTRY_PROJECT }}
        run: |
          docker push \
            "registry.edgegap.com/${PROJECT}/hopnbop-server:${VERSION}"
      - name: Register Edgegap version (delete-and-create for upsert)
        env:
          VERSION: ${{ inputs.version }}
          PROJECT: ${{ secrets.EDGEGAP_REGISTRY_PROJECT }}
          EDGEGAP_TOKEN: ${{ secrets.EDGEGAP_TOKEN }}
          # Edgegap pulls the image from its own private registry
          # at deployment time. Without these, the deployment
          # immediately fails with "Unable to pull image from
          # registry" even when the push succeeded. Same robot
          # account used for the docker login above.
          REGISTRY_USERNAME: ${{ secrets.EDGEGAP_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.EDGEGAP_REGISTRY_PASSWORD }}
          # Server-to-server key for unauthenticated Nakama RPCs
          # (register_server, runtime_status). entrypoint.sh
          # reads $NAKAMA_HTTP_KEY before posting to Nakama.
          # Without it the entrypoint logs "skipping
          # register_server" and Nakama can't route matched
          # players to this container.
          NAKAMA_HTTP_KEY: ${{ secrets.NAKAMA_HTTP_KEY }}
          # Cloudflare DNS pre-warming (Zone:DNS:Edit on the
          # SERVER_DNS_BASE zone — same token as cert-rotate).
          # Read by entrypoint.sh to register/delete the
          # `s-<ip>.<base>` A record around the container's
          # lifetime.
          CLOUDFLARE_DNS_TOKEN: ${{ secrets.CLOUDFLARE_DNS_TOKEN }}
          CLOUDFLARE_DNS_ZONE_ID: ${{ secrets.CLOUDFLARE_DNS_ZONE_ID }}
        run: |
          # Delete first so a re-run with the same version replaces
          # the previous record. 404 is fine — means no prior
          # version. Anything else (auth/server) gets surfaced.
          DEL_HTTP=$(curl -sS -o /tmp/del.json -w '%{http_code}' \
            -X DELETE \
            -H "Authorization: token $EDGEGAP_TOKEN" \
            "https://api.edgegap.com/v1/app/hopnbop-server/version/$VERSION")
          echo "DELETE returned HTTP $DEL_HTTP"
          if [[ "$DEL_HTTP" != "200" && "$DEL_HTTP" != "204" \
              && "$DEL_HTTP" != "404" ]]; then
            cat /tmp/del.json
            exit 1
          fi
          # Create with the schema Edgegap actually requires.
          # docker_image is the path-after-the-registry-host;
          # docker_repository is the registry hostname.
          # docker_tag is the image tag. ports declare what the
          # container listens on (Edgegap port-forwards these
          # to dynamic external ports per deployment).
          # req_cpu is millicores; req_memory is MB.
          # `envs` injects per-deployment env vars into the
          # container. is_injected=true forces them to be set
          # even if the caller doesn't override at allocation
          # time. The keys must already exist in the version
          # record for runtime overrides to work later.
          curl -fsS -X POST \
            -H "Authorization: token $EDGEGAP_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg v "$VERSION" \
              --arg img "$PROJECT/hopnbop-server" \
              --arg repo "registry.edgegap.com" \
              --arg tag "$VERSION" \
              --arg user "$REGISTRY_USERNAME" \
              --arg pass "$REGISTRY_PASSWORD" \
              --arg http_key "$NAKAMA_HTTP_KEY" \
              --arg cf_token "$CLOUDFLARE_DNS_TOKEN" \
              --arg cf_zone "$CLOUDFLARE_DNS_ZONE_ID" \
              '{
                name: $v,
                docker_image: $img,
                docker_repository: $repo,
                docker_tag: $tag,
                private_username: $user,
                private_token: $pass,
                req_cpu: 1024,
                req_memory: 1024,
                ports: [
                  {port: 4433, protocol: "UDP",
                    name: "game", to_check: false},
                  {port: 4434, protocol: "TCP",
                    name: "signaling", to_check: false}
                ],
                envs: [
                  {key: "NAKAMA_HTTP_KEY", value: $http_key,
                    is_injected: true},
                  # entrypoint.sh creates an A record for
                  # s-<ip>.<SERVER_DNS_BASE> pointing at the
                  # deploy public IP. is_secret on the token;
                  # plain on the zone ID (not sensitive).
                  # is_injected forces both to be present
                  # even when callers do not pass them.
                  # NOTE: comment kept apostrophe-free so the
                  # outer single-quoted jq program parses.
                  {key: "CLOUDFLARE_DNS_TOKEN",
                    value: $cf_token,
                    is_secret: true, is_injected: true},
                  {key: "CLOUDFLARE_DNS_ZONE_ID",
                    value: $cf_zone,
                    is_secret: false, is_injected: true}
                ]
              }')" \
            "https://api.edgegap.com/v1/app/hopnbop-server/version"
      - name: Reason
        run: |
          echo "Version: ${{ inputs.version }}"
          echo "Reason: ${{ inputs.reason }}"
