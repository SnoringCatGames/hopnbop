name: Run Tests

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC
  workflow_dispatch:

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger, running unconditionally"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGES=$(git diff --name-only HEAD@{24.hours.ago} HEAD 2>/dev/null || echo "initial")
          if echo "$CHANGES" | grep -qE '^(src/|test/|addons/|project\.godot|\.github/workflows/test\.yml)'; then
            echo "Relevant changes found in last 24 hours"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "No relevant changes in last 24 hours, skipping tests"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  test:
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            Godot_v4.5.1-stable_linux.x86_64
          key: godot-4.5.1-stable-linux-x86_64

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.5.1-stable/Godot_v4.5.1-stable_linux.x86_64.zip
          unzip Godot_v4.5.1-stable_linux.x86_64.zip
          chmod +x Godot_v4.5.1-stable_linux.x86_64

      - name: Ensure Godot is executable
        run: chmod +x Godot_v4.5.1-stable_linux.x86_64

      - name: Verify Test Setup
        run: |
          echo "=== Checking Test Directories ==="
          ls -la test/ || echo "No test directory"
          ls -la test/unit/ || echo "No unit test directory"
          ls -la test/integration/ || echo "No integration test directory"

          echo ""
          echo "=== Checking GUT Addon ==="
          ls -la addons/gut/ || echo "No GUT addon found"

          echo ""
          echo "=== Test .gd Files ==="
          find test -name "*.gd" -type f || echo "No test files found"

      - name: Setup Project Environment
        run: |
          # Create necessary directories
          mkdir -p .godot/imported

          # Try to import the project and handle the expected errors gracefully
          echo "Attempting project import (errors expected in CI)..."
          timeout 180s ./Godot_v4.5.1-stable_linux.x86_64 --headless --import --quit 2>&1 | tee import.log || {
            echo "Import completed with exit code $?"
          }

          # Show import results
          echo "=== Import Results ==="
          tail -n 30 import.log || echo "No import log found"

          # Check for critical issues
          if grep -q "GUT class_names have not been imported" import.log; then
            echo "WARNING: GUT classes not imported, but this is expected in CI"
          fi

      - name: Run Unit Tests
        continue-on-error: true
        id: unit-tests
        timeout-minutes: 10
        run: |
          echo "Starting unit tests..."
          echo "Command: ./Godot_v4.5.1-stable_linux.x86_64 --headless --path . --script addons/gut/gut_cmdln.gd -gdir=res://test/unit -gexit -gjunit_xml_file=unit_test_results.xml"

          timeout 300s ./Godot_v4.5.1-stable_linux.x86_64 --headless --path . \
            --script addons/gut/gut_cmdln.gd \
            -gdir=res://test/unit \
            -gexit \
            -gjunit_xml_file=unit_test_results.xml 2>&1 | tee unit_test.log || {
            EXIT_CODE=$?
            echo "Unit tests exited with code: $EXIT_CODE"
            if [ $EXIT_CODE -eq 124 ]; then
              echo "ERROR: Tests timed out after 300 seconds"
            fi
          }

          echo "Checking for output file..."
          ls -la unit_test_results.xml 2>&1 || echo "No unit test results file generated"

      - name: Run Integration Tests
        continue-on-error: true
        id: integration-tests
        timeout-minutes: 10
        run: |
          echo "Starting integration tests..."
          echo "Command: ./Godot_v4.5.1-stable_linux.x86_64 --headless --path . --script addons/gut/gut_cmdln.gd -gdir=res://test/integration -gexit -gjunit_xml_file=integration_test_results.xml"

          timeout 300s ./Godot_v4.5.1-stable_linux.x86_64 --headless --path . \
            --script addons/gut/gut_cmdln.gd \
            -gdir=res://test/integration \
            -gexit \
            -gjunit_xml_file=integration_test_results.xml 2>&1 | tee integration_test.log || {
            EXIT_CODE=$?
            echo "Integration tests exited with code: $EXIT_CODE"
            if [ $EXIT_CODE -eq 124 ]; then
              echo "ERROR: Tests timed out after 300 seconds"
            fi
          }

          echo "Checking for output file..."
          ls -la integration_test_results.xml 2>&1 || echo "No integration test results file generated"

      - name: Display Test Results
        run: |
          echo "=== Test Execution Summary ==="

          echo ""
          echo "=== Unit Test Log (last 50 lines) ==="
          if [ -f unit_test.log ]; then
            tail -n 50 unit_test.log
          else
            echo "No unit test log found"
          fi

          echo ""
          echo "=== Integration Test Log (last 50 lines) ==="
          if [ -f integration_test.log ]; then
            tail -n 50 integration_test.log
          else
            echo "No integration test log found"
          fi

          echo ""
          echo "=== Results Files ==="
          ls -la *test_results.xml || echo "No XML result files found"

      - name: Verify Test Results Exist
        run: |
          if ! ls *test_results.xml 1> /dev/null 2>&1; then
            echo "ERROR: No test result XML files were generated!"
            echo "Tests failed to run or produce output."
            exit 1
          fi
          echo "✓ Test result files found"

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            *test_results.xml
