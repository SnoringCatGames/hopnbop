name: Nakama Runtime Deploy

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for rolling the runtime'
        required: false
        default: 'Manual deploy'

jobs:
  test:
    name: go vet + go test + staticcheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: third_party/snoringcat-platform/runtime
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT }}
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - run: go vet ./...
      - run: go test ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

  nakama-runtime:
    name: Build and deploy snoringcat.so
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Default GITHUB_TOKEN doesn't authenticate against
          # sibling private SnoringCatGames repos, so the
          # snoringcat-platform submodule clone 404s without a
          # PAT. SUBMODULE_PAT is a classic PAT with `repo`
          # scope across the org.
          token: ${{ secrets.SUBMODULE_PAT }}
      - name: Build plugin .so
        run: |
          RUNTIME_DIR="third_party/snoringcat-platform/runtime"
          mkdir -p "$RUNTIME_DIR/build"
          BUILD_ID="${{ github.sha }}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X main.BuildID=${BUILD_ID} -X main.BuildTime=${BUILD_TIME}"
          docker run --rm \
            -v "$PWD/$RUNTIME_DIR:/backend" -w /backend \
            heroiclabs/nakama-pluginbuilder:3.25.0 \
            build -buildmode=plugin -trimpath \
            -ldflags "${LDFLAGS}" \
            -o ./build/snoringcat.so .
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.NAKAMA_SSH_KEY }}
          NAKAMA_HOST: ${{ secrets.NAKAMA_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          scp -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/id_ed25519 \
            third_party/snoringcat-platform/runtime/build/snoringcat.so \
            "root@$NAKAMA_HOST:/opt/nakama/modules/snoringcat.so"
          ssh -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/id_ed25519 "root@$NAKAMA_HOST" \
            "cd /opt/nakama && docker compose restart nakama"
      - name: Reason
        run: |
          echo "Reason: ${{ github.event.inputs.reason }}"
