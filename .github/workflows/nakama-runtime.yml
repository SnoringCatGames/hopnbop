name: Nakama Runtime Deploy

# Standalone deploy of just the Nakama runtime plugin. Triggered
# manually via `gh workflow run nakama-runtime.yml` (or the
# Actions UI). Use this for runtime-only iterations that don't
# need the rest of the release.yml jobs (web-client, game-server,
# Discord notify) to fire.
#
# The full Release workflow still runs all four jobs together
# when you push a v*.*.* tag.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Why are you rolling the runtime?
        required: false
        default: 'Manual deploy'

jobs:
  nakama-runtime:
    name: Build and deploy snoringcat.so
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build plugin .so
        run: |
          mkdir -p nakama-runtime/build
          BUILD_ID="${{ github.sha }}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X main.BuildID=${BUILD_ID} -X main.BuildTime=${BUILD_TIME}"
          docker run --rm \
            -v $PWD/nakama-runtime:/backend -w /backend \
            heroiclabs/nakama-pluginbuilder:3.25.0 \
            build -buildmode=plugin -trimpath \
            -ldflags "${LDFLAGS}" \
            -o ./build/snoringcat.so .
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.NAKAMA_SSH_KEY }}
          NAKAMA_HOST: ${{ secrets.NAKAMA_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          scp -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/id_ed25519 \
            nakama-runtime/build/snoringcat.so \
            "root@$NAKAMA_HOST:/opt/nakama/modules/snoringcat.so"
          ssh -o StrictHostKeyChecking=accept-new \
            -i ~/.ssh/id_ed25519 "root@$NAKAMA_HOST" \
            "cd /opt/nakama && docker compose restart nakama"
      - name: Reason
        run: echo "Reason: ${{ github.event.inputs.reason }}"
