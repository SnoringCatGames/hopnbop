AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Hop 'n Bop GameLift Backend

Globals:
  Function:
    Timeout: 120
    Runtime: python3.12
    MemorySize: 512
    Environment:
      Variables:
        GAME_VERSION: "0.3.0"
        PLAYERS_TABLE: !Ref PlayersTable
        MATCH_HISTORY_TABLE: !Ref MatchHistoryTable
        PROVIDER_MAPPINGS_TABLE: !Ref ProviderMappingsTable
        MATCHMAKING_CONFIG: !Ref MatchmakingConfigName

Parameters:
  SteamAppID:
    Type: String
    Description: Steam App ID
    Default: ''

  MatchmakingConfigName:
    Type: String
    Description: GameLift matchmaking configuration name
    Default: 'hopnbop-ffa-matchmaker'

Resources:
  # API Gateway
  GameBackendAPI:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        ApiKeyRequired: false

  # Shared IAM policy for Secrets Manager access.
  SecretsManagerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:hopnbop/*'

  # Lambda Functions
  AuthLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.login
      Environment:
        Variables:
          STEAM_APP_ID: !Ref SteamAppID
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - !Ref SecretsManagerPolicy
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/login
            Method: post

  AuthAnonFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.anonymous_login
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - !Ref SecretsManagerPolicy
      Events:
        AnonLogin:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/anon
            Method: post

  AuthRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.refresh
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        Refresh:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/refresh
            Method: post

  AuthLinkFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.link_account
      Environment:
        Variables:
          STEAM_APP_ID: !Ref SteamAppID
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - !Ref SecretsManagerPolicy
      Events:
        Link:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/link
            Method: post

  AuthUnlinkFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.unlink_account
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - !Ref SecretsManagerPolicy
      Events:
        Unlink:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/unlink
            Method: post

  AuthDeleteAccountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.delete_account
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - !Ref SecretsManagerPolicy
      Events:
        DeleteAccount:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/account
            Method: delete

  JoinMatchmakingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.join_matchmaking
      Timeout: 150
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:StartMatchmaking
                - gamelift:DescribeMatchmaking
                - gamelift:StopMatchmaking
              Resource: '*'
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        Join:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /matchmaking/join
            Method: post

  StartMatchmakingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.start_matchmaking
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:StartMatchmaking
              Resource: '*'
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        StartMatch:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /matchmaking/start
            Method: post

  GetMatchStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.get_matchmaking_status
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:DescribeMatchmaking
              Resource: '*'
        - !Ref SecretsManagerPolicy
      Events:
        GetStatus:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /matchmaking/status/{ticket_id}
            Method: get

  # Match Result Functions
  SubmitMatchResultFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.match_handler.submit_match_result
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - !Ref SecretsManagerPolicy
      Events:
        SubmitResult:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /matches/result
            Method: post

  GetLeaderboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.match_handler.get_leaderboard
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        GetLeaderboard:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /leaderboard
            Method: get

  GetPlayerStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.match_handler.get_player_stats
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - !Ref SecretsManagerPolicy
      Events:
        GetPlayerStats:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /players/{player_id}/stats
            Method: get

  # DynamoDB Tables
  PlayersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-players
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
        - AttributeName: rating_partition
          AttributeType: S
        - AttributeName: rating
          AttributeType: N
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: rating-index
          KeySchema:
            - AttributeName: rating_partition
              KeyType: HASH
            - AttributeName: rating
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - display_name
              - matches_played
              - wins
              - losses

  ProviderMappingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-provider-mappings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: provider_composite
          AttributeType: S
      KeySchema:
        - AttributeName: provider_composite
          KeyType: HASH

  MatchHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-match-history
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
        - AttributeName: match_timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
        - AttributeName: match_timestamp
          KeyType: RANGE

Outputs:
  ApiEndpoint:
    Description: 'API Gateway endpoint URL'
    Value: !Sub 'https://${GameBackendAPI}.execute-api.${AWS::Region}.amazonaws.com/prod'

  PlayersTableName:
    Description: 'DynamoDB players table'
    Value: !Ref PlayersTable

  ProviderMappingsTableName:
    Description: 'DynamoDB provider mappings table'
    Value: !Ref ProviderMappingsTable

  MatchHistoryTableName:
    Description: 'DynamoDB match history table'
    Value: !Ref MatchHistoryTable
