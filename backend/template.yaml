AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Hop 'n Bop GameLift Backend

Globals:
  Function:
    Timeout: 120
    Runtime: python3.12
    MemorySize: 512
    Environment:
      Variables:
        GAME_VERSION: "0.5.1"
        PLAYERS_TABLE: !Ref PlayersTable
        MATCH_HISTORY_TABLE: !Ref MatchHistoryTable
        PROVIDER_MAPPINGS_TABLE: !Ref ProviderMappingsTable
        MATCHMAKING_CONFIG: !Ref MatchmakingConfigName
        CONSENT_AUDIT_TABLE: !Ref ConsentAuditTable
        POWERTOOLS_METRICS_NAMESPACE: HopNBop

Parameters:
  SteamAppID:
    Type: String
    Description: Steam App ID
    Default: ''

  MatchmakingConfigName:
    Type: String
    Description: GameLift matchmaking configuration name
    Default: 'hopnbop-ffa-matchmaker'

  AlertEmail:
    Type: String
    Description: Email address for CloudWatch alarm notifications
    Default: ''

Conditions:
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, '']]

Resources:
  # API Gateway
  GameBackendAPI:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        ApiKeyRequired: false

  # Shared IAM policy for Secrets Manager access.
  SecretsManagerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:hopnbop/*'

  # Lambda Functions
  AuthLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.login
      Environment:
        Variables:
          STEAM_APP_ID: !Ref SteamAppID
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - !Ref SecretsManagerPolicy
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/login
            Method: post

  AuthAnonFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.anonymous_login
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - !Ref SecretsManagerPolicy
      Events:
        AnonLogin:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/anon
            Method: post

  AuthRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.refresh
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        Refresh:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/refresh
            Method: post

  AuthLinkFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.link_account
      Environment:
        Variables:
          STEAM_APP_ID: !Ref SteamAppID
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - !Ref SecretsManagerPolicy
      Events:
        Link:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/link
            Method: post

  AuthUnlinkFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.unlink_account
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - !Ref SecretsManagerPolicy
      Events:
        Unlink:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/unlink
            Method: post

  AuthDeleteAccountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.auth_handler.delete_account
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConsentAuditTable
        - !Ref SecretsManagerPolicy
      Events:
        DeleteAccount:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /auth/account
            Method: delete

  ExportPlayerDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.player_handler.export_player_data
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProviderMappingsTable
        - !Ref SecretsManagerPolicy
      Events:
        ExportData:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /player/export
            Method: get

  JoinMatchmakingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.join_matchmaking
      Timeout: 150
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:StartMatchmaking
                - gamelift:DescribeMatchmaking
                - gamelift:StopMatchmaking
              Resource: '*'
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        Join:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /matchmaking/join
            Method: post

  StartMatchmakingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.start_matchmaking
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:StartMatchmaking
              Resource: '*'
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        StartMatch:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /matchmaking/start
            Method: post

  GetMatchStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.matchmaking_handler.get_matchmaking_status
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - gamelift:DescribeMatchmaking
              Resource: '*'
        - !Ref SecretsManagerPolicy
      Events:
        GetStatus:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /matchmaking/status/{ticket_id}
            Method: get

  # Match Result Functions
  SubmitMatchResultFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.match_handler.submit_match_result
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - !Ref SecretsManagerPolicy
      Events:
        SubmitResult:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /matches/result
            Method: post

  GetLeaderboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.match_handler.get_leaderboard
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - !Ref SecretsManagerPolicy
      Events:
        GetLeaderboard:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /leaderboard
            Method: get

  GetPlayerStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.match_handler.get_player_stats
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MatchHistoryTable
        - !Ref SecretsManagerPolicy
      Events:
        GetPlayerStats:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /players/{player_id}/stats
            Method: get

  # Telemetry Functions
  CrashReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handlers.telemetry_handler.handle_crash_report
      MemorySize: 256
      Timeout: 10
      Events:
        CrashReport:
          Type: Api
          Properties:
            RestApiId: !Ref GameBackendAPI
            Path: /telemetry/crash
            Method: post

  # Monitoring and Alerting
  AlarmNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: hopnbop-alarms

  AlarmEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn: !Ref AlarmNotificationTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hopnbop-lambda-errors
      AlarmDescription: Lambda function errors detected
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic

  ApiErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hopnbop-api-5xx-errors
      AlarmDescription: API Gateway 5xx error rate above 5 percent
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Ref GameBackendAPI
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0.05
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic

  DynamoDBThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hopnbop-dynamodb-throttles
      AlarmDescription: DynamoDB throttle events detected
      Namespace: AWS/DynamoDB
      MetricName: ThrottledRequests
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic

  CrashRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hopnbop-crash-rate
      AlarmDescription: Client crash reports exceeding threshold
      Namespace: HopNBop
      MetricName: crash_report
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmNotificationTopic

  # CloudWatch Dashboard
  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: hopnbop-monitoring
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "API Gateway Requests",
                "metrics": [
                  ["AWS/ApiGateway", "Count", "ApiName", "${GameBackendAPI}", {"stat": "Sum"}],
                  ["AWS/ApiGateway", "5XXError", "ApiName", "${GameBackendAPI}", {"stat": "Sum"}],
                  ["AWS/ApiGateway", "4XXError", "ApiName", "${GameBackendAPI}", {"stat": "Sum"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "API Latency (p50 / p99)",
                "metrics": [
                  ["AWS/ApiGateway", "Latency", "ApiName", "${GameBackendAPI}", {"stat": "p50"}],
                  ["AWS/ApiGateway", "Latency", "ApiName", "${GameBackendAPI}", {"stat": "p99"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Errors and Duration",
                "metrics": [
                  ["AWS/Lambda", "Errors", {"stat": "Sum"}],
                  ["AWS/Lambda", "Duration", {"stat": "Average"}],
                  ["AWS/Lambda", "Invocations", {"stat": "Sum"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "DynamoDB (Players Table)",
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${PlayersTable}", {"stat": "Sum"}],
                  ["AWS/DynamoDB", "ConsumedWriteCapacityUnits", "TableName", "${PlayersTable}", {"stat": "Sum"}],
                  ["AWS/DynamoDB", "ThrottledRequests", "TableName", "${PlayersTable}", {"stat": "Sum"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 12, "width": 24, "height": 6,
              "properties": {
                "title": "Game Analytics",
                "metrics": [
                  ["HopNBop", "auth_success", {"stat": "Sum"}],
                  ["HopNBop", "auth_failure", {"stat": "Sum"}],
                  ["HopNBop", "match_completed", {"stat": "Sum"}],
                  ["HopNBop", "player_connected", {"stat": "Sum"}],
                  ["HopNBop", "crash_report", {"stat": "Sum"}],
                  ["HopNBop", "fatal_crash", {"stat": "Sum"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            }
          ]
        }

  # DynamoDB Tables
  PlayersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-players
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
        - AttributeName: rating_partition
          AttributeType: S
        - AttributeName: rating
          AttributeType: N
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: rating-index
          KeySchema:
            - AttributeName: rating_partition
              KeyType: HASH
            - AttributeName: rating
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - display_name
              - matches_played
              - wins
              - losses

  ProviderMappingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-provider-mappings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: provider_composite
          AttributeType: S
      KeySchema:
        - AttributeName: provider_composite
          KeyType: HASH

  MatchHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-match-history
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
        - AttributeName: match_timestamp
          AttributeType: N
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
        - AttributeName: match_timestamp
          KeyType: RANGE

  ConsentAuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hopnbop-consent-audit
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: player_id
          AttributeType: S
      KeySchema:
        - AttributeName: player_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

Outputs:
  ApiEndpoint:
    Description: 'API Gateway endpoint URL'
    Value: !Sub 'https://${GameBackendAPI}.execute-api.${AWS::Region}.amazonaws.com/prod'

  PlayersTableName:
    Description: 'DynamoDB players table'
    Value: !Ref PlayersTable

  ProviderMappingsTableName:
    Description: 'DynamoDB provider mappings table'
    Value: !Ref ProviderMappingsTable

  MatchHistoryTableName:
    Description: 'DynamoDB match history table'
    Value: !Ref MatchHistoryTable

  ConsentAuditTableName:
    Description: 'DynamoDB consent audit table'
    Value: !Ref ConsentAuditTable

  AlarmTopicArn:
    Description: 'SNS topic for alarm notifications'
    Value: !Ref AlarmNotificationTopic
