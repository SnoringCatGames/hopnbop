load_module /usr/lib/nginx/modules/ngx_stream_module.so;

worker_processes 1;
pid /run/nginx.pid;
error_log /game/logs/nginx-error.log warn;

events {
    worker_connections 128;
}

# TLS detection: inspect the first bytes of each TCP
# connection on port 4434. If a TLS ClientHello is
# detected (web client using wss://), route to the
# HTTP block that terminates TLS. Otherwise (native
# client using ws://), pass through directly to Godot.
stream {
    map $ssl_preread_protocol $backend {
        ""      127.0.0.1:4433;
        default 127.0.0.1:4435;
    }

    server {
        listen 4434;
        proxy_pass $backend;
        ssl_preread on;

        # Disable Nagle's algorithm. Critical for
        # real-time game traffic. Without this,
        # small state update packets are buffered
        # and delivered in bursts, adding seconds
        # of latency.
        tcp_nodelay on;
        proxy_socket_keepalive on;
    }
}

# TLS termination for web clients only. Strips the
# Origin header because Godot's WebSocket server
# rejects HTTP upgrade requests that include it
# (all browsers send Origin).
http {
    server {
        listen 4435 ssl;

        ssl_certificate     /game/tls/fullchain.pem;
        ssl_certificate_key /game/tls/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://127.0.0.1:4433;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header Origin "";
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Disable buffering for real-time
            # game traffic.
            proxy_buffering off;
            tcp_nodelay on;
        }
    }
}
